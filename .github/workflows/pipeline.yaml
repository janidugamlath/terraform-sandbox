name: Terraform Lifecycle

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  # -------------------------------------------------
  # Detect which modules changed
  # -------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      random_pet: ${{ steps.filter.outputs.random_pet }}
      random_password: ${{ steps.filter.outputs.random_password }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            random_pet:
              - 'tf-resouces/random_pet/**'
            random_password:
              - 'tf-resouces/random_password/**'


  # -------------------------------------------------
  # Terraform job (runs per module using matrix)
  # -------------------------------------------------
  terraform:
    needs: changes
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module:
          - random_pet
          - random_password

    permissions:
      pull-requests: write
      contents: read

    defaults:
      run:
        working-directory: tf-resouces/${{ matrix.module }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Skip module if no changes
        if: ${{ (matrix.module == 'random_pet' && needs.changes.outputs.random_pet != 'true') || 
                 (matrix.module == 'random_password' && needs.changes.outputs.random_password != 'true') }}
        run: echo "Skipping module ${matrix.module} as no changes detected." && exit 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true

      - name: Terraform Init
        run: terraform init

      # -----------------------------
      # Terraform Plan (PR)
      # -----------------------------
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        id: plan
        run: terraform plan -no-color

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_DATA: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const plan = process.env.PLAN_DATA;
            const body = `
            ### Terraform Plan (${context.job})

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # -----------------------------
      # Terraform Apply (Merge to main)
      # -----------------------------
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: apply
        run: terraform apply -auto-approve -no-color

      - name: Post Apply Result
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        env:
          APPLY_OUT: "${{ steps.apply.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            const pr = result.data[0];
            if (!pr) {
              console.log("No PR found.");
              return;
            }

            github.rest.issues.createComment({
              issue_number: pr.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              ### Terraform Apply Successful

              <details><summary>Show Apply Output</summary>

              \`\`\`terraform
              ${process.env.APPLY_OUT}
              \`\`\`

              </details>
              `
            });