name: "Terraform Lifecycle"

on:
  pull_request:
    branches: [main]
    paths:
      - "tf-resouces/environments/terraform/**"
  push:
    branches: [main]
    paths:
      - "tf-resouces/environments/terraform/**"

jobs:
  module-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Modules
        id: set-matrix
        run: |
          # 1. Get changed files
          # 2. Extract path up to the 5th directory (the module name)
          # 3. 'sort -u' removes the duplicates
          # 4. Convert to a JSON array for the matrix

          BASE_PATH="tf-resouces/environments/terraform"

          # Detect files changed in the PR or the last Push
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DIFF=$(git diff --name-only origin/${{ github.base_ref }} ${{ github.sha }})
          else
            DIFF=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          fi

          # Filter for our TF path, cut to module level, and remove duplicates
          MODULES=$(echo "$DIFF" | grep "^$BASE_PATH/" | cut -d/ -f1-5 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

          if [ "$MODULES" == "[]" ] || [ -z "$MODULES" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$MODULES" >> $GITHUB_OUTPUT
          fi

  terraform:
    needs: module-changes
    if: needs.module-changes.outputs.matrix != '[]' && needs.module-changes.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.module-changes.outputs.matrix) }}

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ matrix.module }}

      - name: Terraform Format
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.module }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.module }}

      - name: Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ matrix.module }}

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        id: plan
        run: terraform plan -no-color
        working-directory: ${{ matrix.module }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_DATA: "${{ steps.plan.outputs.stdout }}"
          MODULE_NAME: "${{ matrix.module }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Module: \`${process.env.MODULE_NAME}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>
            \`\`\`terraform
            ${process.env.PLAN_DATA}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: apply
        run: terraform apply -auto-approve -no-color
        working-directory: ${{ matrix.module }}

      - name: Post Apply Results to PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        env:
          APPLY_OUT: "${{ steps.apply.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const prNumber = result.data.length > 0 ? result.data[0].number : null;
            if (prNumber) {
              github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `### ✅ Terraform Apply Successful!\nThe infrastructure has been updated.\n\n<details><summary>Show Apply Output</summary>\n\n\`\`\`terraform\n${process.env.APPLY_OUT}\n\`\`\`\n\n</details>`
              });
            } else {
              console.log("No associated PR found for this push.");
            }
