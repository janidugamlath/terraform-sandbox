name: "Terraform Lifecycle"

on:
  pull_request:
    branches: [main]
    paths:
      - "environments/**/*.tf"
  push:
    branches: [main]
    paths:
      - "environments/**/*.tf"

jobs:
  format-and-detect:
    name: "Format & Detect Changes"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      matrix: ${{ steps.changed-files.outputs.all_changed_files }}
      has_changes: ${{ steps.changed-files.outputs.any_changed }}
      fmt_changed: ${{ steps.auto_commit.outputs.changes_detected }}

    steps:
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
          persist-credentials: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Detect Changed Modules
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: "environments/**"
          dir_names: "true"
          # dir_names_max_depth: "3"
          dir_names_exclude_current_dir: "true"
          json: "true"
          escape_json: "false"

      - name: Terraform Format (Targeted)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo '${{ steps.changed-files.outputs.all_changed_files }}' | jq -r '.[]' | while IFS= read -r dir; do
            if [ -d "$dir" ]; then
              echo "Running terraform fmt on: $dir"
              terraform fmt "$dir"
            fi
          done

      - name: Auto-Commit Format Fixes
        id: auto_commit
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: terraform format issues"
          file_pattern: "environments/**/*.tf"

      - name: Notify Format Fix Committed
        if: steps.auto_commit.outputs.changes_detected == 'true'
        run: |
          echo "Terraform formatting issues were found and fixed automatically."
          echo "A new commit has been pushed. The workflow will re-run on that commit."

  terraform:
    name: "Terraform (${{ matrix.module }})"
    needs: format-and-detect
    if: needs.format-and-detect.outputs.has_changes == 'true' && needs.format-and-detect.outputs.fmt_changed != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.format-and-detect.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ matrix.module }}

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: ${{ matrix.module }}

      - name: Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ matrix.module }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        id: plan
        run: terraform plan -out=tfplan.binary -no-color 2>&1 | tee plan.txt
        working-directory: ${{ matrix.module }}

      - name: Convert Plan to Text
        if: github.event_name == 'pull_request'
        run: terraform show -no-color tfplan.binary > plan_readable.txt
        working-directory: ${{ matrix.module }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          MODULE_NAME: "${{ matrix.module }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planText = fs.readFileSync('${{ matrix.module }}/plan_readable.txt', 'utf8');
            const planOutcome = '${{ steps.plan.outcome }}';
            const moduleName = process.env.MODULE_NAME;

            const output = `#### Module: \`${moduleName}\`
            #### Terraform Plan 📖 \`${planOutcome}\`
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${planText}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Plan (Pre-Apply)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: plan_apply
        run: terraform plan -out=tfplan.binary -no-color
        working-directory: ${{ matrix.module }}

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: apply
        run: terraform apply -no-color tfplan.binary 2>&1 | tee apply.txt
        working-directory: ${{ matrix.module }}

      - name: Post Apply Results to PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        env:
          MODULE_NAME: "${{ matrix.module }}"
          APPLY_OUTCOME: "${{ steps.apply.outcome }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const applyText = fs.readFileSync('${{ matrix.module }}/apply.txt', 'utf8');
            const moduleName = process.env.MODULE_NAME;
            const applyOutcome = process.env.APPLY_OUTCOME;

            const statusEmoji = applyOutcome === 'success' ? '✅' : '❌';
            const statusLabel = applyOutcome === 'success' ? 'Succeeded' : 'Failed';

            const body = `#### Module: \`${moduleName}\`
            #### Terraform Apply ${statusEmoji} \`${statusLabel}\`
            <details><summary>Show Apply Output</summary>

            \`\`\`terraform
            ${applyText}
            \`\`\`

            </details>`;

            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            const pr = result.data.length > 0 ? result.data[0] : null;
            if (pr) {
              github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              core.warning(`No associated PR found for commit ${context.sha}. Apply output not posted.`);
            }
