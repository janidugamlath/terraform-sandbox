name: "Terraform Lifecycle"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # -------------------------------------------------
  # Detect changed files
  # -------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      random_pet: ${{ steps.filter.outputs.random_pet }}
      random_password: ${{ steps.filter.outputs.random_password }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            random_pet:
              - 'tf-resouces/random_pet/**'
            random_password:
              - 'tf-resouces/random_password/**'

  # -------------------------------------------------
  # Terraform Random Pet
  # -------------------------------------------------
  terraform-random-pet:
    needs: changes
    if: needs.changes.outputs.random_pet == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    defaults:
      run:
        working-directory: ./tf-resouces/random_pet
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        id: plan
        run: terraform plan -no-color
        continue-on-error: false

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_DATA: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const plan = process.env.PLAN_DATA;
            const output = `#### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`
            
            <details><summary>Show Plan Output</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: apply
        run: terraform apply -auto-approve -no-color

      - name: Post Apply Results to PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        env:
          APPLY_OUT: "${{ steps.apply.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const prNumber = result.data.length > 0 ? result.data[0].number : null;
            if (prNumber) {
              github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `### ✅ Terraform Apply Successful!\nThe infrastructure has been updated.\n\n<details><summary>Show Apply Output</summary>\n\n\`\`\`terraform\n${process.env.APPLY_OUT}\n\`\`\`\n\n</details>`
              });
            } else {
              console.log("No associated PR found for this push.");
            }
  # -------------------------------------------------
  # Terraform Random Password
  # -------------------------------------------------
  terraform-random-password:
    needs: changes
    if: needs.changes.outputs.random_password == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    defaults:
      run:
        working-directory: ./tf-resouces/random_password
    steps:
      - name: Checkout Code
