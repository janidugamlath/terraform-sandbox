name: "Terraform Lifecycle"

on:
  pull_request:
    branches: [main]
    paths:
      - "environments/**/*.tf"
  push:
    branches: [main]
    paths:
      - "environments/**/*.tf"

jobs:
  format-and-detect:
    name: "Format & Detect Changes"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      fmt_changed: ${{ steps.auto_commit.outputs.changes_detected }}

    steps:
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Detect Changed Modules
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} ${{ github.sha }} -- 'environments/**')
          else
            BEFORE_SHA=${{ github.event.before }}
            if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES=$(git show --name-only --format="" ${{ github.sha }} -- 'environments/**')
            else
              CHANGED_FILES=$(git diff --name-only $BEFORE_SHA ${{ github.sha }} -- 'environments/**')
            fi
          fi

          # Extract unique module directories (dirs that contain a main.tf)
          MODULES=""
          if [ -n "$CHANGED_FILES" ]; then
            while IFS= read -r file; do
              dir=$(dirname "$file")
              if [ -f "$dir/main.tf" ]; then
                MODULES="$MODULES\n$dir"
              fi
            done <<< "$CHANGED_FILES"
          fi

          MODULES=$(printf "$MODULES" | sort -u | grep -v '^$')

          if [ -z "$MODULES" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            JSON_MODULES=$(echo "$MODULES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "matrix=$JSON_MODULES" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Format (Targeted)
        if: steps.set-matrix.outputs.matrix != '[]'
        run: |
          echo '${{ steps.set-matrix.outputs.matrix }}' | jq -r '.[]' | while IFS= read -r dir; do
            if [ -d "$dir" ]; then
              echo "Running terraform fmt on: $dir"
              terraform fmt "$dir"
            fi
          done

      - name: Auto-Commit Format Fixes
        id: auto_commit
        if: steps.set-matrix.outputs.matrix != '[]'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated terraform fmt"
          file_pattern: "environments/**/*.tf"
          token: ${{ steps.app_token.outputs.token }}

      - name: Notify Format Fix Committed
        if: steps.auto_commit.outputs.changes_detected == 'true'
        run: |
          echo "Terraform formatting issues were found and fixed automatically."
          echo "A new commit has been pushed. The workflow will re-run on that commit."

  terraform:
    name: "Terraform (${{ matrix.module }})"
    needs: format-and-detect
    if: needs.format-and-detect.outputs.matrix != '[]' && needs.format-and-detect.outputs.matrix != '' && needs.format-and-detect.outputs.fmt_changed != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.format-and-detect.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ matrix.module }}

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: ${{ matrix.module }}

      - name: Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ matrix.module }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        id: plan
        run: terraform plan -out=tfplan.binary -no-color 2>&1 | tee plan.txt
        working-directory: ${{ matrix.module }}

      - name: Convert Plan to Text
        if: github.event_name == 'pull_request'
        run: terraform show -no-color tfplan.binary > plan_readable.txt
        working-directory: ${{ matrix.module }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          MODULE_NAME: "${{ matrix.module }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planText = fs.readFileSync('${{ matrix.module }}/plan_readable.txt', 'utf8');
            const planOutcome = '${{ steps.plan.outcome }}';
            const moduleName = process.env.MODULE_NAME;

            const output = `#### Module: \`${moduleName}\`
            #### Terraform Plan 📖 \`${planOutcome}\`
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${planText}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Plan (Pre-Apply)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: plan_apply
        run: terraform plan -out=tfplan.binary -no-color
        working-directory: ${{ matrix.module }}

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: apply
        run: terraform apply -no-color tfplan.binary 2>&1 | tee apply.txt
        working-directory: ${{ matrix.module }}

      - name: Post Apply Results to PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        env:
          MODULE_NAME: "${{ matrix.module }}"
          APPLY_OUTCOME: "${{ steps.apply.outcome }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const applyText = fs.readFileSync('${{ matrix.module }}/apply.txt', 'utf8');
            const moduleName = process.env.MODULE_NAME;
            const applyOutcome = process.env.APPLY_OUTCOME;

            const statusEmoji = applyOutcome === 'success' ? '✅' : '❌';
            const statusLabel = applyOutcome === 'success' ? 'Succeeded' : 'Failed';

            const body = `#### Module: \`${moduleName}\`
            #### Terraform Apply ${statusEmoji} \`${statusLabel}\`
            <details><summary>Show Apply Output</summary>

            \`\`\`terraform
            ${applyText}
            \`\`\`

            </details>`;

            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            const pr = result.data.length > 0 ? result.data[0] : null;
            if (pr) {
              github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              core.warning(`No associated PR found for commit ${context.sha}. Apply output not posted.`);
            }
