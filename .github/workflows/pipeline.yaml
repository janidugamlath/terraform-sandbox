name: "Terraform Lifecycle"

on:
  pull_request:
    branches: [main]
    paths:
      - "tf-resouces/environments/terraform/**"
  push:
    branches: [main]
    paths:
      - "tf-resouces/environments/terraform/**"

jobs:
  format-and-detect:
    name: "Format & Detect Changes"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      fmt_changed: ${{ steps.auto_commit.outputs.changes_detected }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Using a PAT is CRITICAL to trigger the next workflow run after auto-fix
          token: ${{ secrets.MY_GIT_PAT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format (Global)
        run: terraform fmt -recursive tf-resouces/environments/terraform/

      - name: Auto-Commit Fixes
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated terraform fmt"
          file_pattern: "tf-resouces/environments/terraform/**/*.tf"

      - name: Stop if Formatted
        if: steps.auto_commit.outputs.changes_detected == 'true'
        run: |
          echo "Formatting issues were found and fixed automatically."
          echo "A new workflow run has been triggered by the push. Terminating this run."
          exit 1

      - name: Detect Changed Modules
        id: set-matrix
        run: |
          BASE_PATH="tf-resouces/environments/terraform"
          
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Ensure we have the base branch to compare against
            git fetch origin ${{ github.base_ref }}
            DIFF=$(git diff --name-only origin/${{ github.base_ref }} ${{ github.sha }})
          else
            DIFF=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          fi

          # Extract paths up to the 5th directory level (the module root)
          MODULES=$(echo "$DIFF" | grep "^$BASE_PATH/" | cut -d/ -f1-5 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          
          if [ "$MODULES" == "[]" ] || [ -z "$MODULES" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$MODULES" >> $GITHUB_OUTPUT
          fi

  terraform:
    name: "Terraform Operation"
    needs: format-and-detect
    # Proceed only if there are changes and we didn't just restart due to a format fix
    if: needs.format-and-detect.outputs.matrix != '[]' && needs.format-and-detect.outputs.fmt_changed != 'true'
    runs-on: ubuntu-latest
    env:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.format-and-detect.outputs.matrix) }}
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ matrix.module }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.module }}

      - name: Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ matrix.module }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        id: plan
        run: terraform plan -no-color
        working-directory: ${{ matrix.module }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_DATA: "${{ steps.plan.outputs.stdout }}"
          MODULE_NAME: "${{ matrix.module }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Module: \`${process.env.MODULE_NAME}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>
            \`\`\`terraform
            ${process.env.PLAN_DATA}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: apply
        run: terraform apply -auto-approve -no-color
        working-directory: ${{ matrix.module }}

      - name: Post Apply Results to PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        env:
          APPLY_OUT: "${{ steps.apply.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const prNumber = result.data.length > 0 ? result.data[0].number : null;
            if (prNumber) {
              github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `### Terraform Apply Successful!\nThe infrastructure has been updated.\n\n<details><summary>Show Apply Output</summary>\n\n\`\`\`terraform\n${process.env.APPLY_OUT}\n\`\`\`\n\n</details>`
              });
            }
