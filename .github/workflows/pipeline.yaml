name: "Terraform Lifecycle"

on:
  pull_request:
    branches: [main]
    paths:
      - "tf-resouces/environments/terraform/**"
  push:
    branches: [main]
    paths:
      - "tf-resouces/environments/terraform/**"

jobs:
  format-and-detect:
    name: "Format & Detect Changes"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      fmt_changed: ${{ steps.auto_commit.outputs.changes_detected }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_GIT_PAT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Detect Changed Modules
        id: set-matrix
        run: |
          BASE_PATH="tf-resouces/environments/terraform"
          
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin ${{ github.base_ref }}
            DIFF=$(git diff --name-only origin/${{ github.base_ref }} ${{ github.sha }})
          else
            # For pushes, handle first push or existing branch
            BEFORE_SHA=${{ github.event.before }}
            if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              DIFF=$(git show --name-only --format="" ${{ github.sha }})
            else
              DIFF=$(git diff --name-only $BEFORE_SHA ${{ github.sha }})
            fi
          fi

          # Get unique module paths (up to 5th level)
          MODULES=$(echo "$DIFF" | grep "^$BASE_PATH/" | cut -d/ -f1-5 | sort -u)
          
          if [ -z "$MODULES" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "found_modules=false" >> $GITHUB_OUTPUT
          else
            # Save raw list for the fmt step and JSON for the matrix output
            echo "$MODULES" > changed_dirs.txt
            JSON_MODULES=$(echo "$MODULES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "matrix=$JSON_MODULES" >> $GITHUB_OUTPUT
            echo "found_modules=true" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Format (Targeted)
        if: steps.set-matrix.outputs.found_modules == 'true'
        run: |
          while IFS= read -r dir; do
            if [ -d "$dir" ]; then
              echo "Formatting $dir"
              terraform -chdir="$dir" fmt
            fi
          done < changed_dirs.txt

      - name: Auto-Commit Fixes
        id: auto_commit
        if: steps.set-matrix.outputs.found_modules == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated terraform fmt"
          file_pattern: "tf-resouces/environments/terraform/**/*.tf"

      - name: Stop if Formatted
        if: steps.auto_commit.outputs.changes_detected == 'true'
        run: |
          echo "Formatting issues were found and fixed automatically."
          exit 1

  terraform:
    name: "Terraform Operation"
    needs: format-and-detect
    # Proceed only if there are changes and we didn't just restart due to a format fix
    if: needs.format-and-detect.outputs.matrix != '[]' && needs.format-and-detect.outputs.fmt_changed != 'true'
    runs-on: ubuntu-latest
    env:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.format-and-detect.outputs.matrix) }}
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true
          cli_config_credentials_hostname: 'app.terraform.io'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ matrix.module }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.module }}

      - name: Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ matrix.module }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        id: plan
        run: terraform plan -no-color
        working-directory: ${{ matrix.module }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_DATA: "${{ steps.plan.outputs.stdout }}"
          MODULE_NAME: "${{ matrix.module }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const rawPlan = process.env.PLAN_DATA || "";
            
            // Regex to find the start of the actual changes and capture until the end
            // This looks for the standard Terraform "Plan:" or "No changes" summary markers
            const planMatch = rawPlan.match(/(Plan:[\s\S]+|No changes.[\s\S]+|Terraform will perform the following actions:[\s\S]+)/);
            const filteredPlan = planMatch ? planMatch[0].trim() : "No plan summary found.";

            const status = "${{ steps.plan.outcome }}".toUpperCase();
            const icon = status === "SUCCESS" ? "✅" : "❌";

            const output = `### Module: \`${process.env.MODULE_NAME}\`
            **Result:** ${icon} \`${status}\`
            \`\`\`terraform
            ${filteredPlan}
            \`\`\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });


      - name: Post Apply Results to PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        env:
          APPLY_OUT: "${{ steps.apply.outputs.stdout }}"
          MODULE_NAME: "${{ matrix.module }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const rawApply = process.env.APPLY_OUT || "";
            
            // Same logic as Plan: find the summary and the actions
            const applyMatch = rawApply.match(/(Terraform will perform the following actions:[\s\S]+?Plan:[\s\S]+?Apply complete![\s\S]+|Apply complete![\s\S]+)/);
            const filteredApply = applyMatch ? applyMatch[0].trim() : "Apply successful (summary details not found).";

            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            const prNumber = result.data.length > 0 ? result.data[0].number : null;
            
            if (prNumber) {
              const output = `### Module: \`${process.env.MODULE_NAME}\`
            **Apply Result:** ✅ \`SUCCESS\`
            \`\`\`terraform
            ${filteredApply}
            \`\`\``;

              github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }